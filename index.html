<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musikk og bilder</title>
    <style>
      @font-face {
        font-family: "AGENCYB";
        src: url("./data/fonts/AGENCYB.TTF") format("truetype");
      }
      @font-face {
        font-family: "AGENCYR";
        src: url("./data/fonts/AGENCYR.TTF") format("truetype");
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        user-select: none;
      }

      #opening {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .sub {
        font-family: "AGENCYR", sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        color: #ffc000;
        letter-spacing: 0.15em;
        text-align: center;
        font-weight: 100;
      }
      .main {
        font-family: "AGENCYR", sans-serif;
        font-size: clamp(2.5rem, 8vw, 6rem);
        color: #ffc000;
        letter-spacing: 0.05em;
        text-align: center;
        line-height: 1;
        margin: 0.15em 0 0.3em;
        font-weight: 100;
      }
      .showname {
        font-family: "AGENCYR", sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.8rem);
        color: #ffc000;
        letter-spacing: 0.12em;
        text-align: center;
        margin-bottom: 3em;
        min-height: 1.5em;
        font-weight: 100;
      }
      .logo {
        font-family: "AGENCYR", sans-serif;
        font-size: clamp(2.5rem, 7vw, 5rem);
        letter-spacing: 0.03em;
        color: #ffc000;
        font-weight: 100;
      }
      .logo span {
        color: #9dc3e7;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 0.75;
        }
      }
    </style>
  </head>
  <body>
    <div id="opening">
      <div class="sub">Musikk og bilder</div>
      <div class="main">for kropp og sjel</div>
      <div class="showname" id="show-name">Laster...</div>
      <div class="logo"><span>B</span>estefar.no</div>
    </div>

    <script>
      fetch("./data/content/imagemusic.json")
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("show-name").textContent =
            data.quizName || "";
          document.title = data.quizName || "Musikk og bilder";
        })
        .catch(() => {
          document.getElementById("show-name").textContent = "";
        });

      function goToShow() {
        window.location.href = "./data/screens/imageMusic.html";
      }

      document.getElementById("opening").addEventListener("click", goToShow);

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") goToShow();
        if (e.key === "ArrowLeft") {
          document.getElementById("opening").style.transform = "scale(0.98)";
          setTimeout(() => {
            document.getElementById("opening").style.transform = "scale(1)";
          }, 120);
        }
      });
    </script>
  </body>
</html>
