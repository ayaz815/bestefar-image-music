<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musikk og bilder</title>
    <style>
      @font-face {
        font-family: "AGENCYB";
        src: url("../fonts/AGENCYB.TTF") format("truetype");
      }
      @font-face {
        font-family: "AGENCYR";
        src: url("../fonts/AGENCYR.TTF") format("truetype");
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* ── OPENING ── */
      #opening {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        opacity: 1;
        transition: opacity 1.2s ease;
        cursor: pointer;
      }
      #opening.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .opening-sub {
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        color: #ffc000;
        letter-spacing: 0.15em;
        text-align: center;
      }
      .opening-main {
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(2.5rem, 8vw, 6rem);
        color: #ffc000;
        letter-spacing: 0.05em;
        text-align: center;
        line-height: 1;
        margin: 0.15em 0 0.3em;
      }
      .opening-showname {
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 2.5vw, 1.8rem);
        color: #ffc000;
        letter-spacing: 0.12em;
        text-align: center;
        margin-bottom: 3em;
      }
      .opening-logo {
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(2.5rem, 7vw, 5rem);
        letter-spacing: 0.03em;
        color: #ffc000;
      }
      .opening-logo span {
        color: #9dc3e7;
      }
      .opening-hint {
        position: absolute;
        bottom: 2.5rem;
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(0.75rem, 1.5vw, 1rem);
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.1em;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 0.75;
        }
      }

      /* ── SHOW ── */
      #show {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        transition: opacity 3.5s ease;
      }
      #show.visible {
        opacity: 1;
      }

      /* ── SLIDES ── */
      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 3.5s ease;
        background: #000 center/contain no-repeat;
      }
      .slide.active {
        opacity: 1;
      }
      .slide video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Screen text */
      .slide-text {
        position: absolute;
        bottom: 12%;
        left: 50%;
        transform: translateX(-50%);
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(1.2rem, 3vw, 2.2rem);
        color: #fff;
        background: rgba(0, 0, 0, 0.62);
        padding: 0.4em 1.2em;
        text-align: center;
        opacity: 1;
        transition: opacity 1.5s ease;
        pointer-events: none;
        white-space: nowrap;
        max-width: 80vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .slide-text.hidden {
        opacity: 0;
      }

      /* Melody name */
      .slide-melody {
        position: absolute;
        top: 1.2rem;
        left: 1.5rem;
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(0.75rem, 1.6vw, 1.1rem);
        color: rgba(255, 192, 0, 0.75);
        letter-spacing: 0.06em;
        pointer-events: none;
      }

      /* Page badge */
      #page-badge {
        position: fixed;
        bottom: 0.9rem;
        right: 1rem;
        z-index: 50;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        font-family: "AGENCYB", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(0.8rem, 1.5vw, 1.1rem);
        padding: 3px 9px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        pointer-events: none;
      }

      /* ── NOTES PANEL ── */
      #notes-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #notes-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      #notes-panel {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: min(580px, 92vw);
        max-height: 80vh;
        background: #fff;
        border-radius: 16px 16px 0 0;
        z-index: 70;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        pointer-events: none;
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 -8px 60px rgba(0, 0, 0, 0.6);
      }
      #notes-panel.open {
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      #notes-header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      #notes-title {
        font-family: "AGENCYB", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: 1.1rem;
        color: #222;
        letter-spacing: 0.04em;
      }
      #notes-close {
        width: 28px;
        height: 28px;
        border: none;
        background: #f0f0f0;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        color: #555;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #notes-body {
        padding: 16px 20px 24px;
        overflow-y: auto;
        flex: 1;
        font-family: Arial, sans-serif;
        font-weight: 400;
        font-size: 0.95rem;
        line-height: 1.65;
        color: #333;
      }
      #notes-body h1,
      #notes-body h2,
      #notes-body h3 {
        margin: 0.6em 0 0.3em;
        font-weight: 600;
      }
      #notes-body p {
        margin: 0 0 0.5em;
      }
      #notes-body ul,
      #notes-body ol {
        padding-left: 1.4em;
        margin: 0.3em 0;
      }
      #notes-body img {
        max-width: 100%;
        border-radius: 6px;
        margin: 8px 0;
      }

      /* ── DRAWER ── */
      #drawer-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 55;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #drawer-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      #drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: clamp(150px, 18vw, 210px);
        height: 100%;
        background: rgba(8, 8, 8, 0.96);
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 60;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #drawer.open {
        transform: translateX(0);
      }

      .drawer-item {
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        background: #111;
        transition: border-color 0.2s;
        flex-shrink: 0;
      }
      .drawer-item:hover {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .drawer-item.active {
        border-color: #ffc000;
      }
      .drawer-item.cursor {
        outline: 2px solid rgba(255, 255, 255, 0.85);
        outline-offset: -2px;
      }
      .drawer-item.active.cursor {
        border-color: #ffc000;
        outline: 2px solid rgba(255, 255, 255, 0.85);
        outline-offset: -2px;
      }
      .drawer-item img,
      .drawer-item video {
        width: 100%;
        height: 85px;
        object-fit: cover;
        display: block;
      }
      .drawer-item-ph {
        width: 100%;
        height: 85px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
      }
      .drawer-item-label {
        padding: 5px 7px 7px;
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: 0.65rem;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.3;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
      }

      /* ── NAV ZONES ── */
      #nav-left {
        position: fixed;
        top: 0;
        left: 0;
        width: 20%;
        height: 100%;
        z-index: 40;
        cursor: pointer;
      }
      #nav-right {
        position: fixed;
        top: 0;
        right: 0;
        width: 20%;
        height: 100%;
        z-index: 40;
        cursor: pointer;
      }
      #nav-notes {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 25%;
        height: 25%;
        z-index: 40;
        cursor: pointer;
      }
      #nav-drawer {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 20%;
        height: 20%;
        z-index: 40;
        cursor: pointer;
      }

      /* ── END SCREEN ── */
      #end-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 80;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 2s ease;
        cursor: pointer;
      }
      #end-screen.visible {
        opacity: 1;
      }
      .end-text {
        font-family: "AGENCYB", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(2rem, 6vw, 4.5rem);
        color: #ffc000;
        text-align: center;
        letter-spacing: 0.08em;
      }
      .end-sub {
        font-family: "AGENCYR", Arial Narrow, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        color: rgba(255, 255, 255, 0.5);
        margin-top: 1em;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="opening">
      <div class="opening-sub">Musikk og bilder</div>
      <div class="opening-main">for kropp og sjel</div>
      <div class="opening-showname" id="show-name">Laster...</div>
      <div class="opening-logo"><span>B</span>estefar.no</div>
      <div class="opening-hint">▶ Trykk høyre pil for å starte</div>
    </div>

    <div id="show"><div id="slides-container"></div></div>
    <div id="page-badge"></div>

    <div id="nav-left"></div>
    <div id="nav-right"></div>
    <div id="nav-notes"></div>
    <div id="nav-drawer"></div>

    <div id="notes-backdrop"></div>
    <div id="notes-panel">
      <div id="notes-header">
        <div id="notes-title">Om melodien</div>
        <button id="notes-close">✕</button>
      </div>
      <div id="notes-body"></div>
    </div>

    <div id="drawer-backdrop"></div>
    <div id="drawer"></div>

    <div id="end-screen">
      <div class="end-text">Takk for at du så på!</div>
      <div class="end-sub" id="end-showname"></div>
    </div>

    <!-- The audio element — we drive it entirely from JS -->
    <audio id="shared-audio" loop></audio>

    <script>
      let slides = [],
        currentIndex = -1;
      let autoTimer = null;
      let showStarted = false;
      let notesOpen = false,
        drawerOpen = false;
      let drawerCursorIndex = 0;

      const sharedAudio = document.getElementById("shared-audio");
      const opening = document.getElementById("opening");
      const showEl = document.getElementById("show");
      const slidesWrap = document.getElementById("slides-container");
      const pageBadge = document.getElementById("page-badge");
      const endScreen = document.getElementById("end-screen");

      const isVideo = (url) => url && /\.(mp4|webm|ogg|mov)/i.test(url);

      // ── Audio ─────────────────────────────────────────────────────────────
      // We keep one audio element and swap its src only when the source changes.
      let currentAudioSrc = "";

      function handleAudio(slide) {
        const mode = slide.imMusicMode || "shared";
        const src =
          mode === "perslide"
            ? slide.perSlideMp3Url || slide.musicFileUrl || ""
            : slide.sharedMp3Url || slide.musicFileUrl || "";

        if (!src) return;

        // Shared mode: keep playing the same track across slides
        if (mode === "shared" && src === currentAudioSrc) {
          // Already loaded — just make sure it's playing
          if (sharedAudio.paused) {
            sharedAudio.play().catch(() => {});
          }
          return;
        }

        currentAudioSrc = src;
        sharedAudio.src = src;
        sharedAudio.loop = mode === "shared";
        sharedAudio.volume = 1;
        sharedAudio.play().catch(() => {});
      }

      // ── Start show ────────────────────────────────────────────────────────
      // Called from a user gesture so the browser allows audio autoplay.
      function startShow() {
        if (showStarted) return;
        showStarted = true;
        opening.classList.add("fade-out");
        showEl.classList.add("visible");
        setTimeout(() => {
          opening.style.display = "none";
          goToSlide(0);
        }, 1300);
      }

      // ── Build slides ──────────────────────────────────────────────────────
      function buildSlides(screens) {
        slidesWrap.innerHTML = "";
        screens.forEach((s) => {
          const div = document.createElement("div");
          div.className = "slide";

          const bg = s.mediaFileUrl || "";
          const bgColor = s.bgColor || "#000";

          if (isVideo(bg)) {
            div.style.background = bgColor;
            const vid = document.createElement("video");
            vid.src = bg;
            vid.autoplay = true;
            vid.loop = true;
            vid.muted = true;
            vid.playsinline = true;
            div.appendChild(vid);
          } else if (bg) {
            div.style.cssText = `background-color:${bgColor};background-image:url('${bg}');background-size:contain;background-repeat:no-repeat;background-position:center;`;
          } else {
            div.style.background = bgColor;
          }

          if (s.screenText) {
            const txt = document.createElement("div");
            txt.className = "slide-text";
            txt.textContent = s.screenText;
            div.appendChild(txt);
          }

          slidesWrap.appendChild(div);
        });
      }

      // ── Build drawer ──────────────────────────────────────────────────────
      function buildDrawer(screens) {
        const drawer = document.getElementById("drawer");
        drawer.innerHTML = "";
        screens.forEach((s, i) => {
          const item = document.createElement("div");
          item.className = "drawer-item";
          const bg = s.mediaFileUrl || "";
          if (isVideo(bg)) {
            const v = document.createElement("video");
            v.src = bg;
            v.muted = true;
            v.preload = "metadata";
            v.style.pointerEvents = "none";
            item.appendChild(v);
          } else if (bg) {
            const img = document.createElement("img");
            img.src = bg;
            img.alt = "";
            img.onerror = () => (img.style.display = "none");
            item.appendChild(img);
          } else {
            const ph = document.createElement("div");
            ph.className = "drawer-item-ph";
            ph.style.background = s.bgColor || "#1a1a1a";
            ph.textContent = "🎵";
            item.appendChild(ph);
          }
          const lbl = document.createElement("div");
          lbl.className = "drawer-item-label";
          item.appendChild(lbl);
          item.addEventListener("click", (e) => {
            e.stopPropagation();
            closeDrawer();
            goToSlide(i);
          });
          drawer.appendChild(item);
        });
      }

      function highlightDrawer(i) {
        document
          .querySelectorAll(".drawer-item")
          .forEach((el, idx) => el.classList.toggle("active", idx === i));
      }

      // ── Drawer cursor ─────────────────────────────────────────────────────
      function openDrawerWithCursor() {
        drawerCursorIndex = currentIndex;
        openDrawer();
        updateDrawerCursor(drawerCursorIndex);
      }
      function updateDrawerCursor(index) {
        const items = document
          .getElementById("drawer")
          .querySelectorAll(".drawer-item");
        items.forEach((el, i) => el.classList.toggle("cursor", i === index));
        const target = items[index];
        if (target)
          target.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }

      // ── Go to slide ───────────────────────────────────────────────────────
      function goToSlide(index) {
        if (index < 0 || index >= slides.length) return;
        clearTimeout(autoTimer);

        if (currentIndex >= 0) {
          const old = slidesWrap.children[currentIndex];
          if (old) old.classList.remove("active");
        }
        currentIndex = index;

        const slide = slides[currentIndex];
        const el = slidesWrap.children[currentIndex];
        if (!el) return;

        el.classList.add("active");
        pageBadge.textContent = `${currentIndex + 1} / ${slides.length}`;
        highlightDrawer(currentIndex);

        // Start / continue audio
        handleAudio(slide);

        // Screen text — show briefly then fade
        const txt = el.querySelector(".slide-text");
        if (txt) {
          txt.classList.remove("hidden");
          setTimeout(() => txt.classList.add("hidden"), 4000);
        }

        // Auto advance
        const secs = parseInt(slide.displaySeconds) || 8;
        autoTimer = setTimeout(() => {
          if (currentIndex < slides.length - 1) goToSlide(currentIndex + 1);
          else showEnd();
        }, secs * 1000);
      }

      // ── End screen ────────────────────────────────────────────────────────
      function showEnd() {
        clearTimeout(autoTimer);
        endScreen.style.display = "flex";
        requestAnimationFrame(() => endScreen.classList.add("visible"));
        sharedAudio.pause();
      }

      // ── Notes ─────────────────────────────────────────────────────────────
      function openNotes() {
        const s = slides[currentIndex];
        if (!s) return;
        document.getElementById("notes-body").innerHTML =
          s.aboutMelody ||
          s.additionalNotes ||
          "<p>Ingen notater for dette bildet.</p>";
        document.getElementById("notes-panel").classList.add("open");
        document.getElementById("notes-backdrop").classList.add("open");
        notesOpen = true;
      }
      function closeNotes() {
        document.getElementById("notes-panel").classList.remove("open");
        document.getElementById("notes-backdrop").classList.remove("open");
        notesOpen = false;
      }

      // ── Drawer ────────────────────────────────────────────────────────────
      function openDrawer() {
        document.getElementById("drawer").classList.add("open");
        document.getElementById("drawer-backdrop").classList.add("open");
        drawerOpen = true;
      }
      function closeDrawer() {
        document.getElementById("drawer").classList.remove("open");
        document.getElementById("drawer-backdrop").classList.remove("open");
        drawerOpen = false;
        document
          .getElementById("drawer")
          .querySelectorAll(".drawer-item")
          .forEach((el) => el.classList.remove("cursor"));
      }

      // ── Events ────────────────────────────────────────────────────────────
      opening.addEventListener("click", startShow);

      document.getElementById("nav-left").addEventListener("click", () => {
        if (drawerOpen) {
          closeDrawer();
          return;
        }
        if (notesOpen) {
          closeNotes();
          return;
        }
        if (currentIndex > 0) goToSlide(currentIndex - 1);
      });

      document.getElementById("nav-right").addEventListener("click", () => {
        if (!showStarted) {
          startShow();
          return;
        }
        if (currentIndex < slides.length - 1) goToSlide(currentIndex + 1);
        else showEnd();
      });

      document.getElementById("nav-notes").addEventListener("click", (e) => {
        e.stopPropagation();
        notesOpen ? closeNotes() : openNotes();
      });
      document.getElementById("nav-drawer").addEventListener("click", (e) => {
        e.stopPropagation();
        drawerOpen ? closeDrawer() : openDrawerWithCursor();
      });
      document
        .getElementById("notes-close")
        .addEventListener("click", closeNotes);
      document
        .getElementById("notes-backdrop")
        .addEventListener("click", closeNotes);
      document
        .getElementById("drawer-backdrop")
        .addEventListener("click", closeDrawer);

      endScreen.addEventListener("click", () => {
        endScreen.classList.remove("visible");
        setTimeout(() => {
          endScreen.style.display = "none";
          goToSlide(0);
          // goToSlide already calls handleAudio, but ensure it plays
          sharedAudio.play().catch(() => {});
        }, 800);
      });

      // ── Keyboard ──────────────────────────────────────────────────────────
      document.addEventListener("keydown", (e) => {
        const key = e.key;

        if (drawerOpen) {
          if (
            [
              "ArrowUp",
              "ArrowDown",
              "ArrowLeft",
              "ArrowRight",
              "Enter",
              "Escape",
            ].includes(key)
          )
            e.preventDefault();
          switch (key) {
            case "ArrowUp":
            case "ArrowLeft":
              drawerCursorIndex = Math.max(0, drawerCursorIndex - 1);
              updateDrawerCursor(drawerCursorIndex);
              break;
            case "ArrowDown":
            case "ArrowRight":
              drawerCursorIndex = Math.min(
                slides.length - 1,
                drawerCursorIndex + 1
              );
              updateDrawerCursor(drawerCursorIndex);
              break;
            case "Enter":
              currentIndex = drawerCursorIndex;
              closeDrawer();
              goToSlide(currentIndex);
              break;
            case "Escape":
              closeDrawer();
              break;
          }
          return;
        }

        if (notesOpen) {
          if (["ArrowUp", "ArrowDown", "Escape"].includes(key))
            e.preventDefault();
          switch (key) {
            case "ArrowUp":
              document
                .getElementById("notes-body")
                .scrollBy({ top: -80, behavior: "smooth" });
              break;
            case "ArrowDown":
            case "Escape":
              closeNotes();
              break;
          }
          return;
        }

        if (["ArrowUp", "ArrowDown"].includes(key)) e.preventDefault();

        switch (key) {
          case "ArrowRight":
            if (!showStarted) {
              startShow();
              return;
            }
            if (currentIndex < slides.length - 1) goToSlide(currentIndex + 1);
            else showEnd();
            break;
          case "ArrowLeft":
            if (!showStarted) return;
            if (currentIndex > 0) goToSlide(currentIndex - 1);
            break;
          case "ArrowUp":
            if (showStarted) openDrawerWithCursor();
            break;
          case "ArrowDown":
            if (showStarted) openNotes();
            break;
          case "Escape":
            closeNotes();
            closeDrawer();
            break;
        }
      });

      // Fullscreen on first interaction
      window.addEventListener("load", () => {
        const requestFs = () => {
          if (!document.fullscreenElement)
            document.documentElement.requestFullscreen().catch(() => {});
        };
        document.addEventListener("click", requestFs, { once: true });
        document.addEventListener("keydown", requestFs, { once: true });
      });

      // ── Load ──────────────────────────────────────────────────────────────
      async function loadShow() {
        let data = null;

        try {
          const r = await fetch("../content/imagemusic.json");
          if (r.ok) data = await r.json();
        } catch {}

        if (!data) {
          const params = new URLSearchParams(location.search);
          const id = params.get("id");
          const base = params.get("api") || "https://api.bestefar.no/api";
          if (id) {
            try {
              const r = await fetch(
                `${base}/image-music/get-image-music-show/${id}`
              );
              if (r.ok) data = await r.json();
            } catch {}
          }
        }

        if (!data) {
          document.getElementById("show-name").textContent =
            "Kunne ikke laste show";
          return;
        }

        const showName = data.quizName || "Ukjent show";
        const screenList = data.screens || [];
        const sharedMp3 = data.sharedMp3Url || "";
        const musicMode = data.imMusicMode || "shared";

        // Inject show-level fields into each screen
        slides = screenList.map((s) => ({
          ...s,
          sharedMp3Url: s.sharedMp3Url || sharedMp3,
          imMusicMode: s.imMusicMode || musicMode,
        }));

        document.getElementById("show-name").textContent = showName;
        document.getElementById("end-showname").textContent = showName;
        document.title = showName;

        buildSlides(slides);
        buildDrawer(slides);

        // Pre-load audio src so it is buffered before the first gesture
        if (sharedMp3) {
          sharedAudio.src = sharedMp3;
          sharedAudio.loop = true;
          sharedAudio.volume = 1;
          sharedAudio.preload = "auto";
          currentAudioSrc = sharedMp3;
        }
      }

      loadShow();
    </script>
  </body>
</html>
